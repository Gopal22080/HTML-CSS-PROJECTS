<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            margin: 0%;
            padding: 0%;
            box-sizing: border-box;

        }
        body{
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: black;
            overflow: hidden;

        }
        .container{
            position: absolute;
            top: 20px;
            height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .circle{
            position: absolute;
            background: transparent;
            width: calc(var(--i) = 2.5vmin);
            aspect-ratio: 1;
            border-radius: 50%;
            border: 30px solid greenyellow;
            transform-style: preserve-3d;
            transform:rotateX(70deg) translateZ(50px);
            animation: animate 3s ease-in-out calc(var(--i) = 0.10s) infinite;
            box-shadow: 0 0 15px gray;
        }
        @keyframes animate{
            0%,
            100%{
                transform: rotateX(70deg) translateZ(50px) translateY(0);
                filter: hue-rotate(0);
            }
            50%{
                transform: rotateX(70deg) translateZ(50px) translateY(-50vmin);
                filter: hue-rotate(0);
            }
        }

    </style>
</head>
<body>
    
    <div class="container">
        <div class="circle" style="--i:var(--i:0)"></div> 
        <div class="circle" style="--i:var(--i:1)"></div> 
        <div class="circle" style="--i:var(--i:2)"></div> 
        <div class="circle" style="--i:var(--i:3)"></div> 
        <div class="circle" style="--i:var(--i:4)"></div> 
        <div class="circle" style="--i:var(--i:5)"></div> 
    </div>
</body>
</html>
