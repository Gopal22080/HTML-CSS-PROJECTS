<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon Rotating Login</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  background-color: #0d0d0d;
  font-family: 'Orbitron', sans-serif;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.circle-wrapper {
  position: relative;
  width: 400px;
  height: 400px;
}

.circle-wrapper2 {
  position: relative;
  width: 500px;
  height: 500px;
}

.rotating-circle {
  position: absolute;
  width: 100%;
  height: 100%;
  border: 4px solid #0ff;
  border-radius: 50%;
  box-shadow: 0 0 30px #0ff, 0 0 60px #0ff inset;
  animation: rotate 6s linear infinite;
  z-index: 1;

}

@keyframes rotate {
  from {
    transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
  }
  to {
    transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
  }
}

.rotating-2 {
  position: absolute;
  width: 200%;
  height: 200%;
  border: 6px solid rgb(85, 0, 255);
  border-radius: 50%;
  box-shadow: 0 0 30px rgb(4, 0, 255), 0 0 60px rgb(34, 0, 255) inset;
  animation: rotate s linear infinite;
  z-index: 1;

}

@keyframes rotate {
  from {
    transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
  }
  to {
    transform: rotateX(180deg) rotateY(180deg) rotateZ(180deg);
  }
}

.login-container {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  padding: 20px;
  border-radius: 15px;
  box-shadow: 0 0 20px #0ff;
  text-align: center;
  width: 300px;
  z-index: 2;
}

h2 {
  margin-bottom: 25px;
  color: #0ff;
  text-shadow: 0 0 5px #0ff;
}

.input-group {
  position: relative;
  margin-bottom: 25px;
}

input {
  background: transparent;
  border: none;
  border-bottom: 2px solid #0ff;
  outline: none;
  color: #0ff;
  font-size: 16px;
  width: 100%;
  padding: 10px 30px 10px 10px;
}

label {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #0ff;
  pointer-events: none;
  transition: 0.3s;
}

input:focus ~ label,
input:valid ~ label {
  top: -15px;
  font-size: 12px;
  color: #0ff;
  text-shadow: 0 0 5px #0ff;
}

.toggle-password {
  position: absolute;
  right: 10px;
  top: 10px;
  cursor: pointer;
  color: #0ff;
  font-size: 18px;
}

button {
  background: transparent;
  border: 2px solid #0ff;
  padding: 10px 20px;
  color: #0ff;
  font-size: 16px;
  cursor: pointer;
  border-radius: 8px;
  transition: 0.3s;
  text-shadow: 0 0 5px #0ff;
}

button:hover {
  background-color: #0ff;
  color: #111;
  box-shadow: 0 0 10px #0ff;
}

  </style>
  <script>
    function togglePassword() {
  const passwordField = document.getElementById("password");
  const type = passwordField.getAttribute("type") === "password" ? "text" : "password";
  passwordField.setAttribute("type", type);
}

  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="circle-wrapper">
    <div class="circle-wrapper2">
    <div class="rotating-circle"></div>
    <div class="rotating-circle2"></div>
    <div class="login-container">
      <h2>Hey Gopu!!</h2>
      <form id="loginForm">
        <div class="input-group">
          <input type="text" id="username" required />
          <label for="username"> Inata Username</label>
        </div>
        <div class="input-group">
          <input type="password" id="password" required />
          <label for="password">Password</label>
          <span class="toggle-password" onclick="togglePassword()">👁️</span>
        </div>
        <button type="submit">Login</button>
      </form>
    </div>
</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
