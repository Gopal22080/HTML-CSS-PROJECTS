<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Circle Login Form</title>
    <style>
    *{
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: 'Segoe UI', sans-serif;
    }
    body{
        height: 100vh;
        background-color: #0d0d0d;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;

    }
    .neon-circle{
        width: 4000px;
        height: 400px;
        border-radius: 50%;
        background: radial-gradient(circle,#0ff 0%,#00f 30%,#a0f 70%);
        box-shadow: 0 0 30px #0ff,0 0 60px #00f, 0 0 90px #a0f;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
    }
    .login-box{
            background: rgba(0,0,0,0.7);
            text-align: center;
            padding: 30px;
            border-radius: 20%;
            width: 80%;
            box-shadow: 0 0 20px #0ff;
            
    }
    .login-box h2{
        color: #0ff;
        margin-bottom: 20px;

    }
    .login-box input{
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        outline: none;
        border-radius: 10px;
        background: #111;
        color: #0ff;
        box-shadow: inset 0 0 5px #0ff;

        
    }
    .login-box button{
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border: none;
        border-radius: 10px;
        background: #0ff;
        color: #000;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 0 10px #0ff,0 0 20px #0ff;
        transition: 0.3s ease;
    }
    .login-box button:hover{
        background: #0cf;
        box-shadow: 0 0 20px #0cf, 0 0 40px #0cf;
    }
    @keyframes spin3d{
        0%{
            transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg);
            box-shadow: 0 0 45px red;
            border: 10px solid red;
        }
        100%{
            transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg);
            box-shadow: 0 0 150px red;
            border: 10px solid red;
        }
    }
    </style>
    <script>
        function keyp() {
         let text1 = document.getElementById(text1);
            text1.style.backgroundColor = "yellow";
        }
        function keyd(){
            let text1 = document.getElementById(text1);
            text1.style.backgroundColor = "red";
        }
        function keyup(){
            let text1 = document.getElementById(text1);
            text1.style.backgroundColor = "white";
        } 
        
    </script>
</head>
<body>
   <div class="neon-circle">
    <div class="login-box">
        <h2>LOGIN</h2>
        <input type="text" placeholder="Username " id="text1" onkeypress="keyp()"  >
        <input type="text" placeholder="Password " id="text1" onkeyup="keyp()" onkeypress="keyd()">
        <button>LOGIN</button>

    </div>

   </div> 
</body>
</html>
