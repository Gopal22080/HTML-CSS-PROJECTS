<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Portfolio</title>
  <link rel="stylesheet" href="style.css" />
</head>
<style>
  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Segoe UI', sans-serif;
  background: #0f0f0f;
  color: #fff;
  scroll-behavior: smooth;
  overflow-x: hidden;
}
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(0,0,0,0.8);
  padding: 15px 30px;
  display: flex;
  justify-content: space-between;
  z-index: 1000;
}
nav a {
  color: #0ff;
  margin-left: 20px;
  text-decoration: none;
  font-weight: bold;
}
.hero {
  height: 100vh;
  background: linear-gradient(to bottom right, #1e1e1e, #000);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
}
.hero h1 {
  font-size: 3rem;
  animation: fadeInDown 1.5s ease-out;
}
.hero p {
  font-size: 1.5rem;
  color: #ccc;
  margin-top: 10px;
  animation: fadeInUp 2s ease-out;
}
section {
  padding: 100px 20px;
  text-align: center;
}
.project-list {
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 30px;
}
.project {
  background: #222;
  padding: 30px;
  width: 200px;
  border-radius: 10px;
  transform: translateY(50px);
  opacity: 0;
  transition: 0.6s ease;
}
.reveal.show {
  transform: translateY(0);
  opacity: 1;
}
form {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 400px;
  margin: auto;
}
input, textarea {
  padding: 10px;
  border: none;
  border-radius: 5px;
}
button {
  padding: 10px;
  background: #0ff;
  color: #000;
  border: none;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s ease;
}
button:hover {
  background: #08f;
}
footer {
  padding: 30px;
  text-align: center;
  background: #111;
  color: #aaa;
}
#loader {
  position: fixed;
  background: #000;
  color: #0ff;
  width: 100%;
  height: 100%;
  z-index: 2000;
  display: flex;
  justify-content: center;
  align-items: center;
  animation: fadeOut 2s ease forwards;
  animation-delay: 2s;
}

/* Animations */
@keyframes fadeInDown {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

</style>
<body>

  <div id="loader">
    <h2>Loading...</h2>
  </div>

  <header>
    <div class="logo">MyLogo</div>
    <nav>
      <a href="#home">Home</a>
      <a href="#projects">Projects</a>
      <a href="#contact">Contact</a>
    </nav>
  </header>

  <section id="home" class="hero parallax">
    <h1>Hi, I'm Arjun</h1>
    <p>Creative Developer & Designer</p>
  </section>

  <section id="projects">
    <h2>My Work</h2>
    <div class="project-list">
      <div class="project reveal">🚀 Project One</div>
      <div class="project reveal">🎨 Project Two</div>
      <div class="project reveal">📱 Project Three</div>
    </div>
  </section>

  <section id="contact">
    <h2>Let's Connect</h2>
    <form>
      <input type="text" placeholder="Name" required />
      <input type="email" placeholder="Email" required />
      <textarea placeholder="Message"></textarea>
      <button>Send</button>
    </form>
  </section>

  <footer>
    <p>© 2025 Arjun. All rights reserved.</p>
  </footer>

  <script src="script.js"></script>

  <script>
    // Scroll reveal effect
const reveals = document.querySelectorAll('.reveal');

function scrollReveal() {
  const windowHeight = window.innerHeight;
  reveals.forEach(el => {
    const top = el.getBoundingClientRect().top;
    if (top < windowHeight - 100) {
      el.classList.add('show');
    }
  });
}

window.addEventListener('scroll', scrollReveal);
window.addEventListener('load', scrollReveal);

// Loader remove after load
window.addEventListener("load", () => {
  const loader = document.getElementById("loader");
  setTimeout(() => loader.style.display = "none", 2500);
});

  </script>
</body>
</html>
